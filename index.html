<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playdio</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Beth+Ellen&family=Schoolbell&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="left">
      <div class="top">
        <div class="notchPill">
          <div class="heroPill"><h1>Playdio</h1></div>
          <div class="timePill"><h1>9:41 am</h1></div>
        </div>
        <div class="visualizer"></div>
      </div>

      <div class="middle">
        <div class="musicSet">
          <div class="coverImg"></div>
          <div class="vinyl"></div>
        </div>
        <div class="channelName"></div>
      </div>

      <div class="down">
        <div class="mediaControls">
          <button class="previousBtn">Previous</button>
          <button class="playPauseBtn">||</button>
          <button class="nextBtn">Next</button>
        </div>
        <div class="volumeSliderPill">
          <div class="volumeIcon"></div>
          <input type="range" class="volumeSlider" />
        </div>
      </div>
    </div>
    <div class="right"></div>
  </body>
</html>
