<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playdio</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Beth+Ellen&family=Schoolbell&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="left">
      <div class="top">
        <div class="notchPill">
          <div class="heroPill"><h1>Playdio</h1></div>
          <div class="timePill">
            <i class="fa-solid fa-radio"></i>
            <h1>9:41 am</h1>
          </div>
        </div>
        <div class="visualizer"></div>
      </div>

      <div class="middle">
        <div class="musicSet">
          <div class="coverImg"></div>
          <div class="vinyl"></div>
        </div>
        <div class="channelName"></div>
      </div>

      <div class="down">
        <div class="mediaControls">
          <button class="previousBtn">Previous</button>
          <button class="playPauseBtn">||</button>
          <button class="nextBtn">Next</button>
        </div>
        <div class="volumeSliderPill">
          <div class="volumeIcon"></div>
          <input type="range" class="volumeSlider" />
        </div>
      </div>
    </div>
    <div class="right">
      <div class="searchBar">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" class="search" placeholder="Search" />
      </div>

      <div class="resultList">
        <button class="stationCard">
          <div class="stationIcon"></div>
          <div class="stationInfo">
            <h2 class="stationName">Lofi Girl Radio</h2>
            <p class="metadata">320 kbps • Australia • Lofi</p>
          </div>
        </button>
      </div>
    </div>
  </body>
</html>
